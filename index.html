<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTImC67gy37sZuTzYjBwlB_82hgHHeLrA",
    authDomain: "mpesa-ledger-6405d.firebaseapp.com",
    projectId: "mpesa-ledger-6405d",
    storageBucket: "mpesa-ledger-6405d.firebasestorage.app",
    messagingSenderId: "1011963187606",
    appId: "1:1011963187606:web:8953e9d193012b22d64db7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.LEDGER_FB = { db, collection, query, orderBy, limit, onSnapshot, doc, updateDoc, addDoc, ready: false };

  signInAnonymously(auth).then(()=>{
    window.LEDGER_FB.ready = true;
    window.dispatchEvent(new Event('ledgerfb-ready'));
  }).catch((err)=>{
    console.error('Firebase auth failed', err);
  });
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{overscroll-behavior-y:none;background:#0B0B0F;color:#EDEDED;font-family:'Barlow',sans-serif;height:100%;}
  h1,h2,h3,.num{font-family:'Barlow Condensed',sans-serif;font-weight:800;}

  .pin-row{display:flex;gap:12px;margin:16px 0;}

  .btn.green{background:#4ADE80;color:#0B0B0F;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1F1F29;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:1000;}
  #toast.show{opacity:1;}
  .section-title{font-size:14px;color:#9A9AA5;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em;}
  #installBanner{display:none;position:fixed;left:16px;right:16px;bottom:16px;background:#1F1F29;border:1px solid #2A2A32;border-radius:14px;padding:14px 16px;align-items:center;gap:12px;z-index:998;}

  .period-chip{flex:1;text-align:center;padding:8px;border-radius:10px;background:#15151C;border:1px solid #232330;font-size:13px;color:#C5C5CD;}
  .period-chip.active{background:#2563EB;border-color:#2563EB;color:#fff;}
  .period-row{background:#15151C;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #232330;}
  .period-row.selected{border-color:#2563EB;}
  .period-row-top{display:flex;justify-content:space-between;align-items:center;}
  .period-label{font-weight:600;font-size:14px;}

<body>

<div id="loginScreen">
  <h1>M-Pesa Ledger</h1>
  <div class="pin-row" id="pinRow"></div>
  <input type="tel" id="pinInput" maxlength="4" autocomplete="off">
  <div class="keypad" id="keypad"></div>
</div>

<div id="app">
  <h2 style="margin-bottom:16px;">M-Pesa Ledger</h2>

  <div class="summary-row">
    <div class="summary-card income"><div class="label">Income</div><div class="val" id="totalIncome">Ksh 0</div></div>
    <div class="summary-card expense"><div class="label">Expenses</div><div class="val" id="totalExpense">Ksh 0</div></div>
    <div class="summary-card net"><div class="label">Net</div><div class="val" id="totalNet">Ksh 0</div></div>
  </div>

  <div class="filters" id="filterChips"></div>

  <div class="section-title" style="margin-top:0;">Breakdown</div>
  <div class="period-toggle" id="periodToggle"></div>
  <div id="periodList"></div>

  <div class="section-title row">

</div>

<div id="catModal">
  <div class="modal-body">
    <h3 style="margin-bottom:14px;">Set category</h3>
    <div id="directionPicker" style="display:none;margin-bottom:14px;">
      <div style="font-size:13px;color:#9A9AA5;margin-bottom:8px;">This transaction is</div>
      <div style="display:flex;gap:8px;">
        <div class="cat-option" id="dirIncomeBtn" style="flex:1;text-align:center;" onclick="pickDirection('income')">Income</div>
        <div class="cat-option" id="dirExpenseBtn" style="flex:1;text-align:center;" onclick="pickDirection('expense')">Expense</div>
      </div>
    </div>
    <div id="catOptions"></div>
    <input id="newCatInput" placeholder="Or type a new category...">
    <button class="btn green" onclick="saveCategory()">Save</button>
  </div>
</div>

<div id="toast"></div>

<div id="installBanner">
  <img src="icon-192.png" alt="MPesa Ledger">
  <div class="txt">Install this app for quick access</div>
  <button class="dismiss" onclick="dismissInstall()">Later</button>
  <button onclick="triggerInstall()">Install</button>
</div>

<script>
const PIN = '0000'; // change this before real use
let enteredPin = '';
let allTx = [];
let activeFilter = 'all';
let editingTxId = null;
let editingCounterparty = null;
let editingNeedsDirection = false;
let pickedDirection = null;
let activePeriod = 'day'; // day | week | month | year
let selectedPeriodRange = null; // {start,end,label} when a period row is tapped

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  try{ if(navigator.vibrate) navigator.vibrate(10); }catch(e){}
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ── PIN LOGIN ──
function renderPinDots(){
  const row = document.getElementById('pinRow');
  row.innerHTML = '';
  for(let i=0;i<4;i++){
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < enteredPin.length ? ' filled' : '');
    row.appendChild(d);
  }
}
function renderKeypad(){
  const kp = document.getElementById('keypad');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','del'];
  kp.innerHTML = keys.map(k=>{
    if(k==='') return '<div></div>';
    if(k==='del') return `<button onclick="pinDel()">&larr;</button>`;
    return `<button onclick="pinPress('${k}')">${k}</button>`;
  }).join('');
}
function pinPress(k){
  if(enteredPin.length>=4) return;
  enteredPin += k;
  renderPinDots();
  if(enteredPin.length===4){
    setTimeout(()=>{
      if(enteredPin===PIN){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').classList.add('show');
        initLedger();
      } else {
        toast('Wrong PIN');
        enteredPin='';
        renderPinDots();
      }
    }, 150);
  }
}
function pinDel(){ enteredPin = enteredPin.slice(0,-1); renderPinDots(); }
renderPinDots();
renderKeypad();
renderPeriodToggle();

// ── LEDGER ──
function initLedger(){
  function start(){
    const fb = window.LEDGER_FB;
    const q = fb.query(fb.collection(fb.db,'transactions'), fb.orderBy('receivedAt','desc'), fb.limit(500));
    fb.onSnapshot(q, snap=>{
      allTx = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      renderFilters();
      renderAll();
    });
  }
  if(window.LEDGER_FB && window.LEDGER_FB.ready) start();
  else window.addEventListener('ledgerfb-ready', start, { once:true });
}

function fmtKsh(n){
  if(n===null || n===undefined) return 'Ksh 0';
  return 'Ksh ' + Number(n).toLocaleString('en-KE', { minimumFractionDigits:0, maximumFractionDigits:0 });
}

function renderFilters(){
  const cats = ['all','income','expense','unparsed', ...new Set(allTx.map(t=>t.category).filter(Boolean))];
  const unique = [...new Set(cats)];
  const chips = document.getElementById('filterChips');
  chips.innerHTML = unique.map(c=>`<div class="filter-chip ${c===activeFilter?'active':''}" onclick="setFilter('${c.replace(/'/g,"\\'")}')">${c==='all'?'All':c==='income'?'Income':c==='expense'?'Expense':c==='unparsed'?'Needs review':c}</div>`).join('');
}
function setFilter(c){ activeFilter = c; renderFilters(); renderAll(); }

// ── PERIOD BREAKDOWN ──
function renderPeriodToggle(){
  const el = document.getElementById('periodToggle');
  const types = [['day','Day'],['week','Week'],['month','Month'],['year','Year']];
  el.innerHTML = types.map(([v,l])=>`<div class="period-chip ${activePeriod===v?'active':''}" onclick="setPeriodType('${v}')">${l}</div>`).join('');
}
function setPeriodType(type){
  activePeriod = type;
  selectedPeriodRange = null;
  renderPeriodToggle();
  renderAll();
}

// Groups by receivedAt (the webhook's server timestamp), since that's
// present and reliable on every transaction regardless of whether the
// SMS itself parsed cleanly.
function periodBucketFor(ts, type){
  const d = new Date(ts);
  if(type==='day'){
    const start = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    const end = start + 86400000;
    const label = d.toLocaleDateString('en-KE', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    return { key:start, start, end, label };
  }
  if(type==='week'){
    const dayIdx = (d.getDay()+6)%7; // Monday = 0
    const start = new Date(d.getFullYear(), d.getMonth(), d.getDate()-dayIdx).getTime();
    const end = start + 7*86400000;
    const weekEnd = new Date(start + 6*86400000);
    const label = `${new Date(start).toLocaleDateString('en-KE',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'})}`;
    return { key:start, start, end, label };
  }
  if(type==='month'){
    const start = new Date(d.getFullYear(), d.getMonth(), 1).getTime();
    const end = new Date(d.getFullYear(), d.getMonth()+1, 1).getTime();
    const label = d.toLocaleDateString('en-KE', { month:'long', year:'numeric' });
    return { key:start, start, end, label };
  }
  const start = new Date(d.getFullYear(), 0, 1).getTime();
  const end = new Date(d.getFullYear()+1, 0, 1).getTime();
  return { key:start, start, end, label: String(d.getFullYear()) };
}

function renderPeriods(sourceTx){
  const groups = new Map();
  sourceTx.forEach(t=>{
    if(t.direction!=='income' && t.direction!=='expense') return; // skip unclassified
    const g = periodBucketFor(t.receivedAt||0, activePeriod);
    if(!groups.has(g.key)) groups.set(g.key, { ...g, income:0, expense:0, count:0 });
    const bucket = groups.get(g.key);
    if(t.direction==='income') bucket.income += (t.amount||0);
    else bucket.expense += (t.amount||0);
    bucket.count++;
  });
  const sorted = [...groups.values()].sort((a,b)=>b.key-a.key);
  const list = document.getElementById('periodList');
  if(sorted.length===0){
    list.innerHTML = '<div style="color:#8A8A95;padding:4px 0 14px;font-size:13px;">No categorized transactions yet.</div>';
    return;
  }
  list.innerHTML = sorted.map(g=>{
    const net = g.income - g.expense;
    const total = (g.income + g.expense) || 1;
    const incPct = (g.income/total*100).toFixed(1);
    const expPct = (g.expense/total*100).toFixed(1);
    const isSelected = selectedPeriodRange && selectedPeriodRange.start===g.start;
    return `
    <div class="period-row ${isSelected?'selected':''}" onclick="togglePeriodFilter(${g.start},${g.end},'${g.label.replace(/'/g,"\\'")}')">
      <div class="period-row-top">
        <div class="period-label">${g.label}</div>
        <div class="period-net ${net>=0?'pos':''}">${net>=0?'+':'-'}${fmtKsh(Math.abs(net))}</div>
      </div>
      <div class="period-sub">
        <span class="inc">+${fmtKsh(g.income)}</span>
        <span class="exp">-${fmtKsh(g.expense)}</span>
        <span class="count">${g.count} tx</span>
      </div>
      <div class="period-bar"><div class="inc-bar" style="width:${incPct}%"></div><div class="exp-bar" style="width:${expPct}%"></div></div>
    </div>`;
  }).join('');
}

function togglePeriodFilter(start, end, label){
  selectedPeriodRange = (selectedPeriodRange && selectedPeriodRange.start===start) ? null : { start, end, label };
  renderAll();
}
function clearPeriodFilter(){
  selectedPeriodRange = null;
  renderAll();
}

function renderAll(){
  let filtered = allTx;
  if(activeFilter==='income') filtered = allTx.filter(t=>t.direction==='income');
  else if(activeFilter==='expense') filtered = allTx.filter(t=>t.direction==='expense');
  else if(activeFilter==='unparsed') filtered = allTx.filter(t=>!t.parsed);
  else if(activeFilter!=='all') filtered = allTx.filter(t=>t.category===activeFilter);

  renderPeriods(filtered);

  let displayList = filtered;
  if(selectedPeriodRange){
    displayList = displayList.filter(t => (t.receivedAt||0) >= selectedPeriodRange.start && (t.receivedAt||0) < selectedPeriodRange.end);
  }

  document.getElementById('txSectionLabel').textContent = selectedPeriodRange ? `Transactions — ${selectedPeriodRange.label}` : 'Transactions';
  document.getElementById('clearPeriodBtn').style.display = selectedPeriodRange ? 'inline' : 'none';

  // Totals: overall grand total by default (unchanged from before), but
  // narrow to the selected period once you tap one, so the summary
  // cards actually answer "how did this week/month look".
  const totalsSource = selectedPeriodRange ? displayList : allTx;
  const income = totalsSource.filter(t=>t.direction==='income').reduce((s,t)=>s+(t.amount||0),0);
  const expense = totalsSource.filter(t=>t.direction==='expense').reduce((s,t)=>s+(t.amount||0),0);
  document.getElementById('totalIncome').textContent = fmtKsh(income);
  document.getElementById('totalExpense').textContent = fmtKsh(expense);
  document.getElementById('totalNet').textContent = fmtKsh(income-expense);

  const list = document.getElementById('txList');
  if(displayList.length===0){
    list.innerHTML = '<div style="color:#8A8A95;padding:20px;text-align:center;">No transactions here yet.</div>';
    return;
  }
  list.innerHTML = displayList.map(t=>{
    const isUncat = (t.category||'').startsWith('Uncategorized');
    return `
    <div class="tx ${!t.parsed?'unparsed':''}">
      <div class="tx-top">
        <div>
          <div class="tx-name">${t.counterpartyName || (t.parsed ? 'Unknown' : 'Unrecognized message')}</div>
          <div class="tx-meta">${t.date||''} ${t.time||''} ${t.code?('&middot; '+t.code):''}</div>
        </div>
        <div class="tx-amount ${t.direction||''}">${t.amount!=null ? (t.direction==='income'?'+':t.direction==='expense'?'-':'')+fmtKsh(t.amount) : ''}</div>
      </div>
      ${t.parsed
        ? `<div class="tx-cat ${isUncat?'uncategorized':''}" onclick="openCatModal('${t.id}','${(t.counterpartyName||'').replace(/'/g,"\\'")}', false, '${t.direction||''}')">${t.category} &#9998;</div>`
        : `<div class="tx-meta" style="margin-top:6px;">${t.rawText}</div>
           <div class="tx-cat" style="margin-top:8px;" onclick="openCatModal('${t.id}','${(t.counterpartyName||'').replace(/'/g,"\\'")}', true, '${t.direction||''}')">${t.category ? t.category+' &#9998;' : 'Set category &amp; type &#9998;'}</div>`
      }
    </div>`;
  }).join('');
}

// ── RECATEGORIZE ──
const COMMON_CATEGORIES = ['Groceries','Transport','Bills - Electricity','Bills - Water','Bills - Internet','Airtime & Data','Health','Rent','School Fees','RidaSwift Business','Swift Shopper Business','Sacco / Chama','Loan','Cash Withdrawal','Cash Deposit','Family Support','Other Income','Other Expense'];

function openCatModal(txId, counterparty, needsDirection, currentDirection){
  editingTxId = txId;
  editingCounterparty = counterparty;
  editingNeedsDirection = !!needsDirection;
  pickedDirection = currentDirection || null;
  const opts = document.getElementById('catOptions');
  opts.innerHTML = COMMON_CATEGORIES.map(c=>`<div class="cat-option" onclick="pickCategory(this,'${c.replace(/'/g,"\\'")}')">${c}</div>`).join('');
  document.getElementById('newCatInput').value='';
  const picker = document.getElementById('directionPicker');
  if(editingNeedsDirection){
    picker.style.display='block';
    document.getElementById('dirIncomeBtn').classList.toggle('selected', pickedDirection==='income');
    document.getElementById('dirExpenseBtn').classList.toggle('selected', pickedDirection==='expense');
  } else {
    picker.style.display='none';
  }
  document.getElementById('catModal').classList.add('open');
}
function pickDirection(dir){
  pickedDirection = dir;
  document.getElementById('dirIncomeBtn').classList.toggle('selected', dir==='income');
  document.getElementById('dirExpenseBtn').classList.toggle('selected', dir==='expense');
}
let pickedCategory = null;
function pickCategory(el, cat){
  document.querySelectorAll('.cat-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  pickedCategory = cat;
  document.getElementById('newCatInput').value = cat;
}
async function saveCategory(){
  const cat = document.getElementById('newCatInput').value.trim();
  if(!cat){ toast('Enter a category'); return; }
  if(editingNeedsDirection && !pickedDirection){ toast('Choose Income or Expense'); return; }
  const fb = window.LEDGER_FB;
  const updateData = { category: cat, categorySource:'manual' };
  if(editingNeedsDirection) updateData.direction = pickedDirection;
  await fb.updateDoc(fb.doc(fb.db,'transactions',editingTxId), updateData);
  try{
    const body = { transactionId: editingTxId, category: cat, counterpartyName: editingCounterparty };
    if(editingNeedsDirection) body.direction = pickedDirection;
    await fetch('/api/recategorize', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
  }catch(e){ console.error(e); }
  document.getElementById('catModal').classList.remove('open');
  toast('Updated');
}
document.getElementById('catModal').addEventListener('click', e=>{
  if(e.target.id==='catModal') e.target.classList.remove('open');
});

// ── INSTALL PROMPT ──
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  if(!localStorage.getItem('ml_install_dismissed')){
    document.getElementById('installBanner').classList.add('show');
  }
});
function triggerInstall(){
  document.getElementById('installBanner').classList.remove('show');
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(()=>{ deferredInstallPrompt = null; });
  }
}
function dismissInstall(){
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('ml_install_dismissed','1');
}
</script>
